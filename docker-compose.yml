version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: diet_db
      POSTGRES_USER: diet_user
      POSTGRES_PASSWORD: diet_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diet_user -d diet_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://diet_user:diet_pass@postgres:5432/diet_db
      JWT_SECRET: dev_secret_change_in_production
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # Optional seed service — run once with: docker compose run --rm seed
  seed:
    image: postgres:16-alpine
    profiles: [seed]
    environment:
      PGPASSWORD: diet_pass
    volumes:
      - ./backend/seed.sql:/seed.sql:ro
    entrypoint: >
      sh -c "
        until pg_isready -h postgres -U diet_user -d diet_db; do sleep 1; done;
        psql -h postgres -U diet_user -d diet_db -f /seed.sql
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
